<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Waiver | University Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .waiver-card {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.8);
        width: 100%;
        max-width: 500px;
        overflow: hidden;
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-header-custom {
        background: #0d6efd;
        padding: 35px;
        text-align: center;
        color: white;
      }

      .icon-box {
        width: 60px;
        height: 60px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        margin: 0 auto 15px;
        backdrop-filter: blur(5px);
      }

      .form-container {
        padding: 40px;
      }

      .form-label {
        font-weight: 600;
        color: #475569;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .form-control,
      .form-select {
        border-radius: 12px;
        padding: 12px 16px;
        border: 2px solid #f1f5f9;
        background-color: #f8fafc;
        transition: all 0.3s;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #0d6efd;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
      }

      .input-group-text {
        background: #f1f5f9;
        border: 2px solid #f1f5f9;
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: #64748b;
      }

      .has-icon .form-control {
        border-left: none;
        border-radius: 0 12px 12px 0;
      }

      .btn-submit {
        background: #0d6efd;
        color: white;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        font-weight: 700;
        font-size: 16px;
        margin-top: 20px;
        transition: all 0.3s;
        box-shadow: 0 10px 20px rgba(13, 110, 253, 0.2);
      }

      .btn-submit:hover {
        background: #0b5ed7;
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(13, 110, 253, 0.3);
      }

      .info-text {
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="waiver-card">
      <div class="card-header-custom">
        <div class="icon-box">
          <i class="bi bi-patch-check"></i>
        </div>
        <h3 class="mb-1">Apply Waiver</h3>
        <p class="mb-0 opacity-75">Update student scholarship info</p>
      </div>

      <div class="form-container">
        <form action="/api/waiver/add" method="POST">
          <div class="mb-3">
            <label class="form-label">Student Official ID</label>
            <div class="input-group has-icon">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                type="text"
                class="form-control"
                name="studentId"
                placeholder="e.g. 2024001"
                required
              />
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Waiver Code</label>
              <input
                type="text"
                class="form-control"
                name="waiverCode"
                placeholder="SCH-101"
                required
              />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Short Name</label>
              <input
                type="text"
                class="form-control"
                name="waiverName"
                placeholder="Merit 20%"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Waiver Percentage (%)</label>
            <div class="input-group">
              <input
                type="number"
                class="form-control"
                name="totalAllowedWaiver"
                placeholder="20"
                min="0"
                max="100"
                required
              />
              <span class="input-group-text">% OFF</span>
            </div>
            <small class="text-muted" style="font-size: 11px"
              >Max allowed is 100%</small
            >
          </div>

          <div class="mb-4">
            <label class="form-label">Status</label>
            <select class="form-select" name="isActive">
              <option value="true" selected>Active Benefit</option>
              <option value="false">Inactive / Expired</option>
            </select>
          </div>

          <button type="submit" class="btn-submit">
            <i class="bi bi-plus-circle me-2"></i> Confirm Waiver
          </button>

          <p class="info-text">
            <i class="bi bi-info-circle me-1"></i> Data will be applied to the
            financial statement immediately.
          </p>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
