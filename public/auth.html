<!DOCTYPE html>
<html>
<head>
  <title>Auth Create</title>
</head>
<body>

<h2>Create Auth User</h2>

<form id="authForm">
  <input type="text" placeholder="Name" id="name" required><br><br>
  <input type="email" placeholder="Email" id="email" required><br><br>
  <input type="password" placeholder="Password" id="password" required><br><br>
  <button type="submit">Create</button>
</form>

<script>
document.getElementById("authForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  const res = await fetch("/api/courses", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert("Auth User Created");
  console.log(result);
});
</script>

</body>
</html>
