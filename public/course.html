<!DOCTYPE html>
<html>
<head>
  <title>Course Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5 shadow-sm p-4 bg-white rounded">
  <h2 class="mb-4">Add Course</h2>

  <form id="courseForm" class="row g-3">

    <!-- ✅ Student ID Added -->
    <div class="col-md-4">
      <label class="form-label">Student ID</label>
      <input type="text" name="studentId" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Course Code</label>
      <input type="text" name="courseCode" class="form-control" required>
    </div>

    <div class="col-md-8">
      <label class="form-label">Course Title</label>
      <input type="text" name="courseTitle" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Level</label>
      <input type="text" name="level" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Credit</label>
      <input type="number" name="credit" class="form-control" required>
    </div>

    <div class="col-md-4">
      <label class="form-label">Prerequisite (comma separated)</label>
      <input type="text" name="prerequisite" class="form-control" placeholder="CSE101, MAT110">
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary w-100">Save Course</button>
    </div>
  </form>

  <hr>
  <div id="statusAlert" class="alert d-none"></div>

  <h4 class="mt-4">Course List</h4>
  <div class="table-responsive">
    <table class="table table-striped align-middle" id="courseTable">
      <thead>
        <tr>
          <!-- ✅ Student ID Column -->
          <th>Student ID</th>
          <th>Code</th>
          <th>Title</th>
          <th>Level</th>
          <th>Credit</th>
          <th>Prerequisite</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  const statusAlert = document.getElementById("statusAlert");
  const tableBody = document.querySelector("#courseTable tbody");

  async function loadCourses() {
    const res = await fetch("/api/courses");
    const courses = await res.json();
    tableBody.innerHTML = "";

    courses.forEach(c => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${c.studentId || ""}</td>
        <td>${c.courseCode || ""}</td>
        <td>${c.courseTitle || ""}</td>
        <td>${c.level || ""}</td>
        <td>${c.credit ?? ""}</td>
        <td>${(c.prerequisite || []).join(", ")}</td>
      `;
      tableBody.appendChild(row);
    });
  }

  document.getElementById("courseForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);

    try {
      const res = await fetch("/api/courses/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      if (!res.ok) throw new Error(result.message || "Failed to add course");

      statusAlert.className = "alert alert-success";
      statusAlert.innerText = result.message || "Course added";
      e.target.reset();
      await loadCourses();
    } catch (err) {
      statusAlert.className = "alert alert-danger";
      statusAlert.innerText = "Error: " + err.message;
    }

    statusAlert.classList.remove("d-none");
  });

  loadCourses();
</script>

</body>
</html>
