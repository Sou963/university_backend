<!DOCTYPE html>
<html>
  <head>
    <title>Insert Financial Record</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light p-5">
    <div class="container">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Insert Student Financial Record</h4>
        </div>
        <div class="card-body">
          <!-- Student Info -->
          <div class="row mb-3">
            <div class="col-md-4">
              <label>Student ID</label>
              <input type="text" id="studentId" class="form-control" required />
            </div>
            <div class="col-md-4">
              <label>Student Name</label>
              <input type="text" id="studentName" class="form-control" />
            </div>
            <div class="col-md-4">
              <label>Program</label>
              <input type="text" id="program" class="form-control" />
            </div>
          </div>

          <div class="mb-3">
            <label>Semester</label>
            <input
              type="text"
              id="semester"
              class="form-control"
              placeholder="Fall 2022"
            />
          </div>

          <hr />

          <!-- Payment Entry -->
          <h5>Add Payment Row</h5>

          <div class="row g-2">
            <div class="col-md-3">
              <input
                type="text"
                id="costHead"
                class="form-control"
                placeholder="Cost Head"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="costAmount"
                class="form-control"
                placeholder="Cost Amount"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="deductiveAmount"
                class="form-control"
                placeholder="Deductive"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="payable"
                class="form-control"
                placeholder="Payable"
              />
            </div>
            <div class="col-md-3">
              <button class="btn btn-success w-100" onclick="addPayment()">
                Add Row
              </button>
            </div>
          </div>

          <div class="row g-2 mt-2">
            <div class="col-md-3">
              <input
                type="text"
                id="paymentDate"
                class="form-control"
                placeholder="Payment Date"
              />
            </div>
            <div class="col-md-3">
              <input
                type="text"
                id="receiptNo"
                class="form-control"
                placeholder="Receipt No"
              />
            </div>
            <div class="col-md-3">
              <input
                type="number"
                id="paidAmount"
                class="form-control"
                placeholder="Paid Amount"
              />
            </div>
          </div>

          <hr />

          <!-- Table Preview -->
          <h5>Payment Preview</h5>
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Cost Head</th>
                <th>Amount</th>
                <th>Deductive</th>
                <th>Payable</th>
                <th>Date</th>
                <th>Receipt</th>
                <th>Paid</th>
              </tr>
            </thead>
            <tbody id="paymentTable"></tbody>
          </table>

          <button class="btn btn-primary w-100" onclick="submitData()">
            Save Financial Record
          </button>

          <div id="message" class="mt-3"></div>
        </div>
      </div>
    </div>

    <script>
      let payments = [];

      function addPayment() {
        const payment = {
          costHead: document.getElementById("costHead").value,
          costAmount: Number(document.getElementById("costAmount").value),
          deductiveAmount: Number(
            document.getElementById("deductiveAmount").value
          ),
          payable: Number(document.getElementById("payable").value),
          paymentDate: document.getElementById("paymentDate").value,
          moneyReceiptNo: document.getElementById("receiptNo").value,
          paidAmount: Number(document.getElementById("paidAmount").value),
        };

        payments.push(payment);
        renderTable();
        clearPaymentInputs();
      }

      function renderTable() {
        const table = document.getElementById("paymentTable");
        table.innerHTML = "";

        payments.forEach((p) => {
          table.innerHTML += `
      <tr>
        <td>${p.costHead}</td>
        <td>${p.costAmount}</td>
        <td>${p.deductiveAmount}</td>
        <td>${p.payable}</td>
        <td>${p.paymentDate}</td>
        <td>${p.moneyReceiptNo}</td>
        <td>${p.paidAmount}</td>
      </tr>
    `;
        });
      }

      function clearPaymentInputs() {
        document
          .querySelectorAll(
            "#costHead, #costAmount, #deductiveAmount, #payable, #paymentDate, #receiptNo, #paidAmount"
          )
          .forEach((input) => (input.value = ""));
      }

      async function submitData() {
        const data = {
          studentId: document.getElementById("studentId").value,
          studentName: document.getElementById("studentName").value,
          program: document.getElementById("program").value,
          semester: document.getElementById("semester").value,
          payments: payments,
        };

        const res = await fetch("/api/financial/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (res.ok) {
          document.getElementById("message").innerHTML =
            "<div class='alert alert-success'>Record Saved Successfully</div>";
          payments = [];
          renderTable();
        } else {
          document.getElementById("message").innerHTML =
            "<div class='alert alert-danger'>Error Saving Record</div>";
        }
      }
    </script>
  </body>
</html>
